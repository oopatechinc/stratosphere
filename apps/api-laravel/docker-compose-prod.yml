version: "3"

services:
  api:
    container_name: api.bookisia
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .env:/var/www/.env
    ports:
      - "9000:80"
    networks:
      - stratosphere

  pgsql:
    image: 'postgres:17-alpine'
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'sail-pgsql:/var/lib/postgresql/data'
    networks:
      - stratosphere
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}" ]
      retries: 3
      timeout: 5s

networks:
  stratosphere:
    driver: bridge

volumes:
  stratosphere-pgsql:
    driver: local
