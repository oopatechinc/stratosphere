services:
  traefik:
    image: traefik:v3.7
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # 1. Define the Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # 2. Add the Global HTTP -> HTTPS Redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"

      # 3. Let's Encrypt / ACME setup
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=support@oopatech.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - webproxy

  api-laravel:
    image: registry.digitalocean.com/stratosphere/api-laravel:latest
    restart: always
    volumes:
      - /app/production/env_files/api/api.production.env:/var/www/.env:ro
    labels:
      - "traefik.enable=true"
      # 1. Listen for the specific API domain
      - "traefik.http.routers.api.rule=Host(`api.oopatech.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=myresolver"

      # 2. Tell Traefik which port your containerized Nginx/Apache/Octane is listening on
      - "traefik.http.services.api.loadbalancer.server.port=80"

      # 3. Optional: Increase the max upload size for API requests (e.g., 50MB for file uploads)
      - "traefik.http.middlewares.api-buffering.buffering.maxRequestBodyBytes=52428800"
      - "traefik.http.routers.api.middlewares=api-buffering"
    networks:
      - webproxy

  pgsql:
    image: 'postgres:17-alpine'
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    env_file:
      - /app/production/env_files/postgres/postgres.production.env
    volumes:
      - 'stratosphere-pgsql:/var/lib/postgresql/data'
    networks:
      - webproxy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      retries: 3
      timeout: 5s

  frontpage:
    image: registry.digitalocean.com/stratosphere/frontpage:latest
    restart: always
    env_file:
      - /app/production/env_files/frontpage/frontpage.production.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontpage.rule=Host(`frontpage.oopatech.com`)"
      - "traefik.http.routers.frontpage.entrypoints=websecure"
      - "traefik.http.routers.frontpage.tls.certresolver=myresolver"
      - "traefik.http.routers.frontpage.priority=100"
    networks:
      - webproxy

  admin-dashboard:
    image: registry.digitalocean.com/stratosphere/admin-dashboard:latest
    restart: always
    env_file:
      - /app/production/env_files/admin/admin.production.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=HostRegexp(`^[a-z0-9-]+\\.oopatech\\.com$`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=myresolver"
      - "traefik.http.routers.admin.priority=10"
    networks:
      - webproxy

networks:
  webproxy:
    driver: bridge

volumes:
  stratosphere-pgsql:
    driver: local